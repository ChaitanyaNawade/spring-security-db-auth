<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
        }

        .container{
            text-align:center;
        }

        h1{
            font-size:120px;
            color:#38bdf8;
        }

        h2{
            font-size:35px;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
        }

        a{
            text-decoration:none;
            background:#38bdf8;
            color:black;
            padding:12px 25px;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        a:hover{
            background:#0ea5e9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Sorry, the page you are looking for does not exist.</p>
    <a href="/home">Go Back Home</a>
</div>

</body>
</html>
