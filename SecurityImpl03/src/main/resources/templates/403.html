<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e293b,#0f172a);
            color:white;
        }

        .container{
            text-align:center;
            padding:40px;
        }

        h1{
            font-size:120px;
            color:#ef4444;
        }

        h2{
            font-size:32px;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
        }

        a{
            text-decoration:none;
            background:#3b82f6;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            transition:0.3s;
        }

        a:hover{
            background:#2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>403</h1>
    <h2>Access Denied</h2>
    <p>You do not have permission to access this page.</p>
    <a href="/home">Go Home</a>
</div>

</body>
</html>
